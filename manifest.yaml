# manifest.yaml — Registry of all connected repos
# Only repos that exist locally and are actively tracked by Gaia.
# Repos not cloned locally are listed under 'uncloned' for reference.

repos:
  - name: claudecodemeta
    github: nanogareth/claudecodemeta
    domain: ai-projects
    status: active
    description: Cross-interface persistent memory for Claude Code

  - name: language_tutor
    github: nanogareth/language_tutor
    domain: ai-projects
    status: active
    description: LLM-based language learning assistant using Claude, starting with French

  - name: obsidian-gaia-plugin
    github: nanogareth/obsidian-gaia-plugin
    domain: ai-projects
    status: active
    description: Obsidian plugin providing visual UI for Gaia ecosystem

  - name: FlowForge
    github: nanogareth/flowforge
    domain: ai-projects
    status: active
    description: Project scaffolding and context bootstrapping for Claude Code

  - name: eudaemon
    github: nanogareth/eudaemon
    domain: ai-projects
    status: active
    description: EU research funding intelligence tool

  - name: metis
    github: nanogareth/metis
    domain: ai-projects
    status: active
    description: Personal investment research platform for advanced technology sectors

# Repos not currently cloned locally — hook sync won't fire for these.
# Clone them to C:\GitHub\ to enable automatic tracking.
uncloned:
  - name: MiniLang
    github: nanogareth/minilang
    domain: ai-projects
    description: Compositional generalization research

  - name: SET
    github: nanogareth/spatial-equivariant-transformer
    domain: ai-projects
    description: Spatial Equivariant Transformer for 3D reasoning

  - name: 3D-Viz-MCP
    github: nanogareth/3d-viz-mcp
    domain: ai-projects
    description: 3D visualization MCP server for LLM agents

  - name: Edify
    github: nanogareth/edify
    domain: work-projects
    description: AI learning content generator
